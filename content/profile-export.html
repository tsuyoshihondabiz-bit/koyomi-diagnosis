<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body { width: 400px; height: 400px; background: transparent; display: flex; align-items: center; justify-content: center; }
  .circle {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(201,168,76,0.2), 0 0 60px rgba(201,168,76,0.1);
  }
  .circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.1);
  }
</style>
</head>
<body>
  <div class="circle">
    <img src="http://localhost:3032/images/profile.png" />
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    window.onload = () => {
      setTimeout(async () => {
        const canvas = await html2canvas(document.body, { width: 400, height: 400, scale: 2, useCORS: true, backgroundColor: null });
        const link = document.createElement('a');
        link.download = 'profile-lp-styled.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }, 1000);
    };
  </script>
</body>
</html>
