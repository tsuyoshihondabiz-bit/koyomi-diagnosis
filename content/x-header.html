<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Cormorant+Garamond:wght@300;400&display=swap');

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #0a0e2a;
  }

  .banner {
    width: 1500px;
    height: 500px;
    position: relative;
    background:
      radial-gradient(ellipse at 25% 40%, rgba(201,168,76,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 60%, rgba(123,107,175,0.05) 0%, transparent 45%),
      linear-gradient(135deg, #080c22 0%, #0a0e2a 40%, #0c1030 70%, #080c22 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Stars */
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.4;
  }
  .star.gold { background: #c9a84c; opacity: 0.5; }
  .star.big { width: 3px; height: 3px; opacity: 0.6; }

  /* Constellation lines */
  .constellation {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Moon */
  .moon {
    position: absolute;
    top: 60px;
    right: 120px;
    font-size: 70px;
    color: rgba(201,168,76,0.12);
    font-family: serif;
  }

  /* Zodiac ring */
  .zodiac-ring {
    position: absolute;
    top: -80px;
    left: -80px;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.06);
  }
  .zodiac-ring-inner {
    position: absolute;
    top: 15px; left: 15px;
    right: 15px; bottom: 15px;
    border-radius: 50%;
    border: 1px dashed rgba(201,168,76,0.05);
  }

  .zodiac-ring-right {
    position: absolute;
    bottom: -60px;
    right: -60px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.05);
  }

  /* Horizontal ornament lines */
  .ornament-line {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .ornament-line .line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
  }
  .ornament-line .diamond {
    width: 6px; height: 6px;
    background: rgba(201,168,76,0.4);
    transform: rotate(45deg);
  }

  /* Subtitle above */
  .sub-top {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.4em;
    color: rgba(201,168,76,0.45);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  /* Main title */
  .title {
    font-family: 'Shippori Mincho', serif;
    font-weight: 800;
    font-size: 100px;
    letter-spacing: 0.15em;
    background: linear-gradient(180deg, #f5e6b8 0%, #c9a84c 40%, #8a7333 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 16px;
    text-shadow: none;
    filter: drop-shadow(0 2px 20px rgba(201,168,76,0.15));
  }

  /* Tagline */
  .tagline {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    letter-spacing: 0.25em;
    color: rgba(232,228,240,0.45);
    margin-bottom: 20px;
  }
  .tagline .gold {
    color: #c9a84c;
    font-weight: 700;
  }

  /* Bottom ornament */
  .bottom-line {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bottom-line .line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
  }
  .bottom-line .sparkle {
    color: rgba(201,168,76,0.3);
    font-size: 14px;
  }

  /* Stats bar at bottom */
  .stats {
    position: absolute;
    bottom: 40px;
    display: flex;
    align-items: center;
    gap: 40px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(180deg, #f5e6b8, #c9a84c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-family: 'Shippori Mincho', serif;
    font-size: 10px;
    color: rgba(136,136,170,0.5);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }
  .stat-divider {
    width: 1px;
    height: 30px;
    background: rgba(201,168,76,0.12);
  }
</style>
</head>
<body>
<div class="banner">
  <!-- Decorative elements -->
  <div class="zodiac-ring"><div class="zodiac-ring-inner"></div></div>
  <div class="zodiac-ring-right"></div>
  <div class="moon">☽</div>

  <!-- Stars scattered -->
  <div class="star" style="top:8%;left:12%"></div>
  <div class="star gold" style="top:15%;left:25%"></div>
  <div class="star" style="top:22%;left:45%"></div>
  <div class="star big gold" style="top:10%;left:68%"></div>
  <div class="star" style="top:30%;left:82%"></div>
  <div class="star" style="top:5%;left:55%"></div>
  <div class="star gold" style="top:18%;left:90%"></div>
  <div class="star" style="top:75%;left:8%"></div>
  <div class="star big" style="top:80%;left:30%"></div>
  <div class="star gold" style="top:85%;left:55%"></div>
  <div class="star" style="top:70%;left:72%"></div>
  <div class="star" style="top:90%;left:88%"></div>
  <div class="star big gold" style="top:65%;left:15%"></div>
  <div class="star" style="top:40%;left:5%"></div>
  <div class="star" style="top:50%;left:95%"></div>
  <div class="star gold" style="top:35%;left:92%"></div>
  <div class="star" style="top:60%;left:3%"></div>
  <div class="star big" style="top:45%;left:10%"></div>
  <div class="star" style="top:55%;left:88%"></div>
  <div class="star gold big" style="top:25%;left:3%"></div>

  <!-- Constellation SVG -->
  <svg class="constellation" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Left constellation -->
    <circle cx="100" cy="180" r="2" fill="rgba(201,168,76,0.3)"/>
    <circle cx="150" cy="140" r="1.5" fill="rgba(201,168,76,0.25)"/>
    <circle cx="180" cy="200" r="1.5" fill="rgba(201,168,76,0.2)"/>
    <circle cx="130" cy="240" r="2" fill="rgba(201,168,76,0.25)"/>
    <line x1="100" y1="180" x2="150" y2="140" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    <line x1="150" y1="140" x2="180" y2="200" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    <line x1="180" y1="200" x2="130" y2="240" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    <line x1="130" y1="240" x2="100" y2="180" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>

    <!-- Right constellation -->
    <circle cx="1350" cy="300" r="2" fill="rgba(201,168,76,0.25)"/>
    <circle cx="1400" cy="260" r="1.5" fill="rgba(201,168,76,0.2)"/>
    <circle cx="1420" cy="340" r="1.5" fill="rgba(201,168,76,0.25)"/>
    <circle cx="1380" cy="370" r="2" fill="rgba(201,168,76,0.2)"/>
    <line x1="1350" y1="300" x2="1400" y2="260" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    <line x1="1400" y1="260" x2="1420" y2="340" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    <line x1="1420" y1="340" x2="1380" y2="370" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
  </svg>

  <!-- Content -->
  <div class="sub-top">Koyomi Fortune Method</div>

  <div class="ornament-line">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>

  <div class="title">暦 占 術</div>

  <div class="tagline">
    星座 × 数秘で導く <span class="gold">108</span>タイプの恋愛診断
  </div>

  <div class="bottom-line">
    <div class="line"></div>
    <div class="sparkle">✦</div>
    <div class="line"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num">30,000件+</div>
      <div class="stat-label">鑑定実績</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">98.2%</div>
      <div class="stat-label">満足度</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">108通り</div>
      <div class="stat-label">診断タイプ</div>
    </div>
  </div>
</div>
</body>
</html>
